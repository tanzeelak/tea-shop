                    <span class="ing ing-fruit ing-lychee" style="bottom:10%;left:34%"></span>

                  <button class="tea-item jar jar-wide jar-honey" data-name="Wish" data-desc="A dreamlike infusion of jasmine, red jujube, and silver-tipped white tea leaves." data-price="$5.75" aria-label="Wish tea">
                    <span class="jar-label">Wish</span>

                    <span class="ing ing-fruit ing-jujube" style="bottom:30%;left:68%"></span>
                    <span class="ing ing-fruit ing-jujube" style="bottom:10%;left:72%"></span>

            </div>

            <!-- Counter -->
            <div class="counter">
              <div class="counter-surface">
              </div>
              <div class="counter-front" aria-hidden="true">

                <div class="plank"></div>
                <div class="plank"></div>
                <div class="plank"></div>
                <div class="plank"></div>
              </div>
            </div>
            <!-- Tea detail popup -->
            <div class="tea-popup" id="teaPopup" hidden>
              <img class="popup-img" src="../assets/tea-leaves.png" alt="Tea leaves" />
              <h3 class="popup-name"></h3>
              <p class="popup-desc"></p>
              <span class="popup-price"></span>
            </div>


            <!-- Warm ambient glow overlay -->
            <div class="ambient-glow" aria-hidden="true"></div>
          </div>
        </section>

      </main>
    </div>
    <script>
      (() => {
        const popup = document.getElementById("teaPopup");
        const nameEl = popup.querySelector(".popup-name");
        const descEl = popup.querySelector(".popup-desc");
        const priceEl = popup.querySelector(".popup-price");
        let activeItem = null;

        function showPopup(btn) {
          if (activeItem) activeItem.classList.remove("active");
          activeItem = btn;
          btn.classList.add("active");

          nameEl.textContent = btn.dataset.name;
          descEl.innerHTML = btn.dataset.desc;
          priceEl.textContent = btn.dataset.price;

          const frame = btn.closest(".shop-frame");
          const frameRect = frame.getBoundingClientRect();
          const btnRect = btn.getBoundingClientRect();

          let top = btnRect.top - frameRect.top;
          let left;

          // Place to the right by default; flip to left if not enough room
          const rightEdge = btnRect.right - frameRect.left + 12;
          const leftEdge = btnRect.left - frameRect.left - 252;

          if (rightEdge + 240 < frame.offsetWidth - 12) {
            left = rightEdge;
          } else {
            left = leftEdge;
          }

          if (top < 12) top = 12;
          if (top + 160 > frame.offsetHeight - 12) top = frame.offsetHeight - 172;

          popup.style.left = left + "px";
          popup.style.top = top + "px";
          popup.hidden = false;
        }

        function hidePopup() {
          popup.hidden = true;
          if (activeItem) {
            activeItem.classList.remove("active");
            activeItem = null;
          }
        }

        document.querySelectorAll(".tea-item").forEach((btn) => {
          btn.addEventListener("mouseenter", () => showPopup(btn));
          btn.addEventListener("mouseleave", hidePopup);
        });

      })();

      // -- Door entrance effect --
      (() => {
        const overlay = document.getElementById("doorOverlay");
        if (!overlay) return;

        const knob = document.getElementById("doorKnob");
        knob.addEventListener("click", () => {
          overlay.classList.add("door-opening");

          overlay.querySelector(".door-left").addEventListener("transitionend", () => {
            overlay.remove();
          });
        });
      })();
    </script>
  </body>
</html>
