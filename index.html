<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cha Lounge | Enchanted Tea Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Floating fireflies -->
    <div class="fireflies" aria-hidden="true">
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
    </div>

    <div class="storefront">
      <main>
        <!-- ====== TEA STOREFRONT SCENE ====== -->
        <section class="shop-scene" id="shop">
          <div class="shop-frame">
            <!-- Hanging shop sign -->
            <div class="shop-sign">
              <div class="sign-chain sign-chain-l" aria-hidden="true"></div>
              <div class="sign-chain sign-chain-r" aria-hidden="true"></div>
              <div class="sign-board">
                <span class="sign-icon" aria-hidden="true">&#9752;</span>
                <h1 class="sign-name">Cha Lounge</h1>
              </div>
            </div>
            <!-- Ceiling -->
            <div class="ceiling" aria-hidden="true">
              <div class="beam"></div>
              <div class="beam"></div>
              <div class="beam"></div>
              <!-- Edison pendant bulbs -->
              <div class="pendant pendant-1">
                <div class="cord"></div>
                <div class="bulb"></div>
                <div class="bulb-glow"></div>
              </div>
              <div class="pendant pendant-2">
                <div class="cord"></div>
                <div class="bulb"></div>
                <div class="bulb-glow"></div>
              </div>
              <div class="pendant pendant-3">
                <div class="cord"></div>
                <div class="bulb"></div>
                <div class="bulb-glow"></div>
              </div>
              <div class="pendant pendant-4">
                <div class="cord"></div>
                <div class="bulb"></div>
                <div class="bulb-glow"></div>
              </div>
              <div class="pendant pendant-5">
                <div class="cord"></div>
                <div class="bulb"></div>
                <div class="bulb-glow"></div>
              </div>
            </div>

            <!-- Back wall -->
            <div class="back-wall">
              <!-- Top shelf -->
              <div class="shelf shelf-top">
                <div class="shelf-board" aria-hidden="true"></div>
                <div class="shelf-bracket bracket-l" aria-hidden="true"></div>
                <div class="shelf-bracket bracket-r" aria-hidden="true"></div>
                <div class="shelf-items">
                  <button class="tea-item jar jar-tall jar-amber" data-name="Oolong Oasis" data-desc="Silky oolong steeped with wintermelon nectar, bright lemon zest, and a drizzle of golden agave." data-price="$5.75" aria-label="Oolong Oasis tea">
                    <span class="jar-label">Oolong Oasis</span>
                    <span class="ing ing-leaf" style="bottom:14%;left:10%;--r:-30deg"></span>
                    <span class="ing ing-leaf" style="bottom:42%;left:62%;--r:20deg"></span>
                    <span class="ing ing-citrus" style="bottom:26%;left:22%"></span>
                    <span class="ing ing-melon" style="bottom:50%;left:14%"></span>
                    <span class="ing ing-drizzle" style="bottom:8%;left:38%"></span>
                  </button>
                  <button class="tea-item jar jar-round jar-cream" data-name="Yuzu Blossom" data-desc="Delicate white tea kissed by sun-ripened yuzu and crushed grape petals." data-price="$5.50" aria-label="Yuzu Blossom tea">
                    <span class="jar-label">Yuzu Blossom</span>
                    <span class="ing ing-citrus" style="bottom:22%;left:12%"></span>
                    <span class="ing ing-citrus ing-sm" style="bottom:42%;left:58%"></span>
                    <span class="ing ing-fruit ing-grape" style="bottom:16%;left:58%"></span>
                    <span class="ing ing-fruit ing-grape" style="bottom:22%;left:70%"></span>
                    <span class="ing ing-leaf" style="bottom:38%;left:18%;--r:35deg"></span>
                  </button>
                  <button class="tea-item jar jar-wide jar-sage" data-name="Jasmine White Tea" data-desc="Pure white tea leaves unfurling with the fragrance of moonlit jasmine blossoms." data-price="$5.25" aria-label="Jasmine White Tea">
                    <span class="jar-label">Jasmine White Tea</span>
                    <span class="ing ing-flower" style="bottom:24%;left:10%"></span>
                    <span class="ing ing-flower ing-sm" style="bottom:42%;left:62%"></span>
                    <span class="ing ing-leaf" style="bottom:14%;left:52%;--r:-25deg"></span>
                    <span class="ing ing-leaf" style="bottom:34%;left:30%;--r:40deg"></span>
                  </button>
                </div>
              </div>

              <!-- Bottom shelf -->
              <div class="shelf shelf-bottom">
                <div class="shelf-board" aria-hidden="true"></div>
                <div class="shelf-bracket bracket-l" aria-hidden="true"></div>
                <div class="shelf-bracket bracket-r" aria-hidden="true"></div>
                <div class="shelf-items">
                  <button class="tea-item jar jar-round jar-dark" data-name="Black Rose Tea" data-desc="Bold black tea entwined with crimson rose petals and a whisper of dark honey." data-price="$5.50" aria-label="Black Rose Tea">
                    <span class="jar-label jar-label-light">Black Rose Tea</span>
                    <span class="ing ing-petal" style="bottom:18%;left:16%;--r:-20deg"></span>
                    <span class="ing ing-petal" style="bottom:38%;left:55%;--r:30deg"></span>
                    <span class="ing ing-petal ing-sm" style="bottom:30%;left:28%;--r:10deg"></span>
                    <span class="ing ing-leaf ing-dark" style="bottom:14%;left:58%;--r:-35deg"></span>
                  </button>
                  <button class="tea-item jar jar-tall jar-olive" data-name="Bali Blend" data-desc="Verdant green tea woven with jasmine, wild rose, and enchanted lychee from distant shores." data-price="$6.00" aria-label="Bali Blend tea">
                    <span class="jar-label">Bali Blend</span>
                    <span class="ing ing-leaf" style="bottom:46%;left:12%;--r:-20deg"></span>
                    <span class="ing ing-leaf" style="bottom:18%;left:54%;--r:30deg"></span>
                    <span class="ing ing-flower ing-sm" style="bottom:34%;left:42%"></span>
                    <span class="ing ing-petal" style="bottom:26%;left:14%;--r:15deg"></span>
                    <span class="ing ing-fruit ing-lychee" style="bottom:10%;left:32%"></span>
                  </button>
                  <button class="tea-item jar jar-wide jar-honey" data-name="Wish" data-desc="A dreamlike infusion of jasmine, red jujube, and silver-tipped white tea leaves." data-price="$5.75" aria-label="Wish tea">
                    <span class="jar-label">Wish</span>
                    <span class="ing ing-flower" style="bottom:28%;left:10%"></span>
                    <span class="ing ing-fruit ing-jujube" style="bottom:16%;left:52%"></span>
                    <span class="ing ing-fruit ing-jujube" style="bottom:22%;left:66%"></span>
                    <span class="ing ing-leaf" style="bottom:38%;left:48%;--r:-30deg"></span>
                    <span class="ing ing-leaf ing-sm" style="bottom:12%;left:24%;--r:20deg"></span>
                  </button>
                </div>
              </div>

            </div>

            <!-- Counter -->
            <div class="counter">
              <div class="counter-surface">
              </div>
              <div class="counter-front" aria-hidden="true">
                <div class="plank"></div>
                <div class="plank"></div>
                <div class="plank"></div>
                <div class="plank"></div>
                <div class="plank"></div>
              </div>
            </div>

            <!-- Tea detail popup -->
            <div class="tea-popup" id="teaPopup" hidden>
              <h3 class="popup-name"></h3>
              <p class="popup-desc"></p>
              <span class="popup-price"></span>
            </div>


            <!-- Warm ambient glow overlay -->
            <div class="ambient-glow" aria-hidden="true"></div>
          </div>
        </section>

      </main>
    </div>
    <script>
      (() => {
        const popup = document.getElementById("teaPopup");
        const nameEl = popup.querySelector(".popup-name");
        const descEl = popup.querySelector(".popup-desc");
        const priceEl = popup.querySelector(".popup-price");
        let activeItem = null;

        function showPopup(btn) {
          if (activeItem) activeItem.classList.remove("active");
          activeItem = btn;
          btn.classList.add("active");

          nameEl.textContent = btn.dataset.name;
          descEl.innerHTML = btn.dataset.desc;
          priceEl.textContent = btn.dataset.price;

          const frame = btn.closest(".shop-frame");
          const frameRect = frame.getBoundingClientRect();
          const btnRect = btn.getBoundingClientRect();

          let left = btnRect.left - frameRect.left + btnRect.width / 2 - 120;
          let top = btnRect.top - frameRect.top - 160;

          if (left < 12) left = 12;
          if (left + 240 > frame.offsetWidth - 12) left = frame.offsetWidth - 252;
          if (top < 12) top = btnRect.bottom - frameRect.top + 10;

          popup.style.left = left + "px";
          popup.style.top = top + "px";
          popup.hidden = false;
        }

        function hidePopup() {
          popup.hidden = true;
          if (activeItem) {
            activeItem.classList.remove("active");
            activeItem = null;
          }
        }

        document.querySelectorAll(".tea-item").forEach((btn) => {
          btn.addEventListener("mouseenter", () => showPopup(btn));
          btn.addEventListener("mouseleave", hidePopup);
        });
      })();
    </script>
  </body>
</html>
