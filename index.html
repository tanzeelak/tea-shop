<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cha lounge</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .shop-art {
        width: min(92vw, 90vh);
      }

      .shop-art object {
        width: 100%;
        height: auto;
        filter: none;
      }
    </style>
  </head>
  <body>
    <div class="shop-art">
      <object id="shop-svg" type="image/svg+xml" data="assets/tea-shop-edges.svg"></object>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vivus@0.4.6/dist/vivus.min.js"></script>
    <script>
      new Vivus("shop-svg", {
        type: "delayed",
        duration: 300,
        animTimingFunction: Vivus.EASE,
        start: "autostart"
      });
    </script>
  </body>
</html>
